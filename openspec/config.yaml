# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: pnpm monorepo TypeScript — apps/api (NestJS 11 + Prisma + PostgreSQL 16), apps/web (React 18 + Vite + TanStack Query + Tailwind), packages/shared (tipos compartidos)
  Architecture: NestJS modulos por dominio (auth, users, tweets, follows, likes); frontend feature-based, mobile-first (breakpoints 640/1024)
  Testing: PLANEADO — Jest + Supertest (api, coverage >=85%), Vitest + Testing Library + MSW (web). Greenfield: aun sin instalar
  Style: ESLint + Prettier, conventional commits en ingles, historial sin squash (requisito del challenge)

# Activado post-scaffolding (2026-07-01): Jest+Supertest (api) y Vitest (web)
# instalados y PROBADOS con smoke tests + gate de coverage 85% verificado.
strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
    - Mapear cada change al criterio de la rubrica del challenge que impacta (Funcionalidad 25 / Testing 25 / Calidad 20 / Proceso 15 / Docs 10 / Bonus 5)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
    - Cada task de feature incluye sus tests en el mismo commit (requisito explicito del challenge)
  apply:
    - Follow existing code patterns and conventions
    - Conventional commits en ingles, granulares, nunca squash
    tdd: true            # RED-GREEN-REFACTOR desde change 02
    test_command: "pnpm test"
  verify:
    test_command: "pnpm test"
    build_command: "pnpm build"
    coverage_threshold: 85
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: true
  detected: 2026-07-01          # re-detección post-scaffolding (apply 01 completo)
  test_runner: "pnpm test"      # Jest 29 (apps/api) + Vitest (apps/web)
  layers:
    unit: available             # Jest (api) / Vitest (web)
    integration: available      # Supertest contra twitter_test en Postgres real (docker, puerto 5433 local)
    e2e: available              # probado: health e2e contra app NestJS completa; auth e2e llega en change 02
  coverage: available           # jest --coverage, gate 85% ACTIVO y verificado (scope src/** excl. módulos/DTOs/generated)
  quality:
    linter: "pnpm lint"         # ESLint flat config compartida en root (negative check probado: exit 1)
    type_checker: "pnpm -r typecheck"  # tsc --noEmit, 3 workspaces
    formatter: "pnpm format"    # Prettier
