name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: twitter_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/twitter_dev
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/twitter_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Create test database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "CREATE DATABASE twitter_test;"

      - name: Migrate test database
        run: pnpm --filter @twitterclone/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/twitter_test

      - name: Test
        run: pnpm test

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Boot the full stack (default env, no .env file)
        run: docker compose up -d --build

      - name: Wait for the proxy to answer /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health > /dev/null; then exit 0; fi
            sleep 2
          done
          echo "stack never became healthy" >&2
          docker compose ps
          exit 1

      - name: Register through the proxy
        run: |
          curl -fsS -c cookies.txt -H 'Content-Type: application/json' \
            -d '{"email":"smoke@example.com","username":"smoke","password":"smoke-password-1","displayName":"Smoke Test"}' \
            http://localhost:8080/auth/register

      - name: Login through the proxy
        run: |
          curl -fsS -c cookies.txt -H 'Content-Type: application/json' \
            -d '{"email":"smoke@example.com","password":"smoke-password-1"}' \
            http://localhost:8080/auth/login

      - name: Authenticated /auth/me with the cookie jar
        run: |
          body=$(curl -fsS -b cookies.txt http://localhost:8080/auth/me)
          echo "$body"
          echo "$body" | grep -q '"username":"smoke"'

      - name: Create a tweet through the proxy
        run: |
          curl -fsS -b cookies.txt -H 'Content-Type: application/json' \
            -d '{"content":"smoke tweet"}' \
            http://localhost:8080/tweets

      - name: Tweet appears in the timeline
        run: curl -fsS -b cookies.txt http://localhost:8080/tweets/timeline | grep -q '"content":"smoke tweet"'

      - name: SPA fallback serves index.html on client routes
        run: curl -fsS http://localhost:8080/u/smoke | grep -qi '<div id="root">'

      - name: Show logs on failure
        if: failure()
        run: docker compose logs
